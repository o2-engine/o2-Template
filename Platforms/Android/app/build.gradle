plugins {
    id 'com.android.application'
}

android {
    namespace 'com.o2.template'
    compileSdk 35
    ndkVersion '28.2.13676358'

    defaultConfig {
        applicationId 'com.o2.template'
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName '1.0'

        ndk {
            abiFilters 'arm64-v8a'
        }

        externalNativeBuild {
            cmake {
                arguments '-DANDROID_STL=c++_static',
                          '-DANDROID_PLATFORM=android-24',
                          '-DO2_EDITOR=OFF',
                          '-DO2_TESTS=OFF'
                targets 'Game'
            }
        }
    }

    externalNativeBuild {
        cmake {
            // Points at the root Game/CMakeLists.txt (three levels up from this file).
            path '../../../CMakeLists.txt'
            version '3.22.1+'
        }
    }

    signingConfigs {
        debug {
            storeFile file('../debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            debuggable true
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // Assets are pre-built by the host (AssetsBuilder) into BuiltAssets/Android.
    // ProjectSettings.json lives at the project root (not inside BuiltAssets) and
    // is staged into a generated-assets dir by the copyProjectSettings task below.
    sourceSets {
        main {
            assets.srcDirs += ['../../../BuiltAssets/Android',
                               "${buildDir}/generated/projectSettingsAssets"]
        }
    }
}

tasks.register('copyProjectSettings', Copy) {
    from "${rootDir}/../../ProjectSettings.json"
    into "${buildDir}/generated/projectSettingsAssets"
}

tasks.whenTaskAdded { task ->
    if (task.name == 'preBuild' || task.name.startsWith('merge') && task.name.endsWith('Assets')) {
        task.dependsOn 'copyProjectSettings'
    }
}

// androidx.appcompat 1.7 pulls kotlin-stdlib 1.8.22, but AGP ships 1.6.21 for
// kotlin-stdlib-jdk7/jdk8 — D8 then finds duplicate classes. Kotlin 1.8+ merges
// jdk7/jdk8 stubs into kotlin-stdlib itself, so pin the whole family to 1.8.22.
configurations.all {
    resolutionStrategy.eachDependency { details ->
        if (details.requested.group == 'org.jetbrains.kotlin') {
            details.useVersion '1.8.22'
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
}
