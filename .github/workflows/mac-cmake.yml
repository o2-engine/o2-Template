name: macOS CMake

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Build Game
            target: Game
            o2_editor: OFF
            o2_tests: OFF
            run_ctest: false
          - name: Build Editor
            target: Editor
            o2_editor: ON
            o2_tests: OFF
            run_ctest: false
          - name: Build & Run Tests
            target: o2UtilTests o2SystemTests o2RenderTests o2EditorTests GameTests GameUITests
            o2_editor: ON
            o2_tests: ON
            run_ctest: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Select Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        echo "DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer" >> "$GITHUB_ENV"

    - name: Install Metal toolchain
      run: |
        set -e
        sudo xcodebuild -license accept || true
        sudo xcodebuild -runFirstLaunch || true
        # Verify whether the Metal compiler can actually compile something.
        TMP_METAL="$(mktemp -d)/probe.metal"
        printf '#include <metal_stdlib>\nusing namespace metal;\nkernel void k() {}\n' > "$TMP_METAL"
        if ! xcrun -sdk macosx metal -c "$TMP_METAL" -o "$TMP_METAL.air" >/dev/null 2>&1; then
          echo "Metal toolchain not functional, downloading..."
          sudo xcodebuild -downloadComponent MetalToolchain
          xcrun -sdk macosx metal -c "$TMP_METAL" -o "$TMP_METAL.air"
        fi
        METAL_PATH="$(xcrun -sdk macosx -find metal)"
        echo "Metal compiler: $METAL_PATH"
        echo "CMAKE_Metal_COMPILER=$METAL_PATH" >> "$GITHUB_ENV"

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DO2_TESTS=${{ matrix.o2_tests }} -DO2_EDITOR=${{ matrix.o2_editor }} -DCMAKE_Metal_COMPILER="$CMAKE_Metal_COMPILER"

    - name: Build with CMake
      run: cmake --build build --config Release --parallel 3 --target ${{ matrix.target }}

    - name: Run tests
      if: matrix.run_ctest
      # This job builds only a subset of the test targets; ctest otherwise reports the
      # unbuilt ones (o2EditorUITests) as *_NOT_BUILT failures.
      run: ctest --test-dir build --build-config Release --output-on-failure --parallel 3 -E '_NOT_BUILT$'
